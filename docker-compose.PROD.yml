# PROD_COMPOSE
services:
  main:
    image: niwibonihs/bot_get_cert:${APP_TAG}
    container_name: GetCert-Bot
    user: "1000:1000"
    restart: "unless-stopped"
    env_file: .env
    depends_on:
      - "redis_fsm"
    logging:
      driver: json-file
      options:
        max-size: "7m"
        max-file: "3"
    volumes:
      - ./data:/app/data  # Монтируем папку для обмена файлами
      - ./logs:/app/logs # Монтируем папку для логов
    networks:
      - get-cert-net
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M

  redis_fsm:
    image: "redis:7"
    container_name: GetCert-Redis
    restart: "unless-stopped"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf  # Монтируем конфигурационный файл
      - redis_data:/data  # Volume для данных Redis
    command: redis-server /usr/local/etc/redis/redis.conf  # Используем конфигурационный файл
    ports:
      - 127.0.0.1:6381:6379
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - get-cert-net
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  redis_data:

networks:
  get-cert-net:
    name: GetCert-Net